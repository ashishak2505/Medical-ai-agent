

name: CI — Lint & Validate

on:
  push:
    branches: ["**"]          # Run on all branches
  pull_request:
    branches: [main, master]  # Run on PRs targeting main

jobs:
  lint-and-validate:
    name: Python ${{ matrix.python-version }} — Lint & Import Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]   # CrewAI requires 3.10–3.13

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install litellm flake8

      # ── 4. Lint with flake8 ───────────────────────────────
      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (line length etc.) but don't fail
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=.venv,__pycache__,.git

      # ── 5. Validate Python files can be imported ──────────
      - name: Validate module imports
        env:
          GROQ_API_KEY: "dummy_key_for_ci"   # Fake key — just checks imports work
        run: |
          python -c "import tools; print('✅ tools.py OK')"
          python -c "import tasks; print('✅ tasks.py OK')"
          python -c "import streamlit; print('✅ streamlit OK')"
          python -c "import crewai; print('✅ crewai OK')"
          python -c "import arxiv; print('✅ arxiv OK')"

      # ── 6. Check .env is not committed ────────────────────
      - name: Check .env is not in repository
        run: |
          if [ -f ".env" ]; then
            echo "❌ ERROR: .env file is committed! Remove it immediately."
            exit 1
          else
            echo "✅ .env is not committed — good."
          fi