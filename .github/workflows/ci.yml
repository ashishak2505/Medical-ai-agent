name: CI — Lint & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-validate:
    name: Python ${{ matrix.python-version }} — Lint & Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ── 3. Upgrade pip & install resolver tools ───────────
      - name: Upgrade pip and install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools flake8

      # ── 4. Install dependencies with increased resolver depth
      - name: Install dependencies
        run: |
          pip install \
            --use-deprecated=legacy-resolver \
            --no-cache-dir \
            -r requirements.txt
          pip install litellm

      # ── 5. Lint with flake8 ───────────────────────────────
      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names only
          flake8 . --count --select=E9,F63,F7,F82 \
            --show-source --statistics \
            --exclude=.venv,__pycache__,.git

          # Warn on style issues but don't fail build
          flake8 . --count --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics \
            --exclude=.venv,__pycache__,.git

      # ── 6. Validate imports work ──────────────────────────
      - name: Validate module imports
        env:
          GROQ_API_KEY: "dummy_key_for_ci"
        run: |
          python -c "import arxiv;      print('✅ arxiv')"
          python -c "import streamlit;  print('✅ streamlit')"
          python -c "import crewai;     print('✅ crewai')"
          python -c "import dotenv;     print('✅ dotenv')"
          python -c "import litellm;    print('✅ litellm')"
          echo "All imports passed ✅"

      # ── 7. Check .env is not committed ────────────────────
      - name: Check .env is not in repo
        run: |
          if [ -f ".env" ]; then
            echo "❌ ERROR: .env file committed — remove it immediately!"
            exit 1
          else
            echo "✅ .env not committed"
          fi

      # ── 8. Check all required files exist ─────────────────
      - name: Check required project files
        run: |
          for f in app.py agents.py tasks.py tools.py main.py requirements.txt; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            else
              echo "✅ Found: $f"
            fi
          done